spring:
  application:
    name: finsight-backend
    datasource:
      url: ${DB_URL}
      username: ${DB_USER}
      password: ${DB_PASSWORD}
      driver-class-name: org.postgresql.Driver

    jpa:
      hibernate:
        ddl-auto: validate
      show-sql: false
      properties:
        hibernate:
          dialect: org.hibernate.dialect.PostgreSQLDialect
          format_sql: true

app:
  jwt:
    secret: ${JWT_SECRET}
    expiration: 86400000
  agent:
    base-url: http://localhost:8000

management:
  endpoints:
    web:
      exposure:
        include: health,info